name: Engineering Gate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  engineering-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: python -m pip install -e .[dev]

      - name: Run engineering gate
        run: python tools/engineering_gate.py --mode standard
